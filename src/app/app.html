<div class="min-h-screen flex flex-col">
  <app-header />
  <main class="flex-1 p-8 bg-linear-to-b from-[#ebfaff] to-[#faf8ff]">
    <router-outlet />
  </main>
  <app-footer />
</div>
@if (overlay.isVisible()) {
  <div class="fixed inset-0 z-50 flex flex-col items-center justify-center gap-4 bg-black/60">
    <p-progressspinner strokeWidth="3" animationDuration=".8s"/>
    <span class="text-white text-md font-medium tracking-wide">Cargando...</span>
  </div>
}
