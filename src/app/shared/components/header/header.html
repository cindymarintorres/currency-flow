<header class="flex items-center justify-between px-8 py-3 bg-white border-b border-gray-200 shadow-sm">

  <a routerLink="/converter" class="flex items-center gap-2 no-underline">
    <i class="text-primary text-2xl">&#128177;</i>
    <span class="text-xl font-bold text-gray-900">CurrencyFlow</span>
  </a>

  <nav class="flex items-center gap-1">
    @for (link of navLinks; track link.path) {
      @if (!link.requiresAuth || auth.isLoggedIn()) {
      <a
        [routerLink]="link.path"
        routerLinkActive="nav-active"
        class="nav-link flex items-center gap-1 px-4 py-2 text-sm font-medium text-gray-500 no-underline rounded-md transition-colors">
        @if (link.icon) {
          <i [class]="link.icon"></i>
        }
        {{ link.label }}
      </a>
      }
    }
  </nav>
<div class="flex items-center gap-3">
  @if (auth.isLoggedIn()) {
    <p-avatar icon="pi pi-user" shape="circle" />
    <span class="text-sm text-gray-600">{{ auth.currentUser()?.email }}</span>
    <p-button
      label="Logout"
      icon="pi pi-sign-out"
      [outlined]="true"
      severity="secondary"
      size="small"
      (onClick)="auth.logout()" />
  } @else {
    <p-button
      label="Login"
      icon="pi pi-sign-in"
      [outlined]="true"
      severity="secondary"
      size="small"
      routerLink="/login" />
    <p-button
      label="Register"
      icon="pi pi-user-plus"
      severity="primary"
      size="small"
      routerLink="/register" />
  }
</div>

</header>
